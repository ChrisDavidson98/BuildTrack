<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BuildTrack" />
  <title>BuildTrack</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0d1117; -webkit-tap-highlight-color: transparent; }
    input, textarea, button, a { font-family: inherit; }
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
    textarea { outline: none; }
    button { outline: none; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #0d1117; } ::-webkit-scrollbar-thumb { background: #2d3344; border-radius: 2px; }
  </style>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ════════════════════════════════════════════════════════════════
//  CONFIGURE — paste your Apps Script URL between the quotes
// ════════════════════════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyOD3tU4NA9Rq8hBeCkgtcelQ6S5Ze1CQXfX2alC3bwgA-oB2sRCbzs_GJv1PWw5B6o/exec';
// ════════════════════════════════════════════════════════════════

const MILESTONES = [
  { key:'tempElectric', label:'Temp Electrical Service',   sublabel:'Ordered'    },
  { key:'gasRiser',     label:'Gas Riser',                  sublabel:'Ordered'    },
  { key:'roughIn',      label:'Rough-In Inspection',        sublabel:'Passed'     },
  { key:'permElectric', label:'Permanent Electrical Meter', sublabel:'Ordered'    },
  { key:'permGas',      label:'Permanent Gas Meter',        sublabel:'Ordered'    },
  { key:'co',           label:'Certificate of Occupancy',   sublabel:'Received'   },
  { key:'walkthrough',  label:'Walkthrough',                sublabel:'Date & Time'},
  { key:'finalClean',   label:'Final Clean',                sublabel:'Scheduled'  },
  { key:'closing',      label:'Closing',                    sublabel:'Date'       },
];

const BONUS_DEFS = [
  { key:'roughIn',  label:'Rough-In Bonus',      abbr:'R/I',   milestoneKey:'roughIn'  },
  { key:'co',       label:'CO Bonus',             abbr:'CO',    milestoneKey:'co'       },
  { key:'closing',  label:'Closing Bonus',        abbr:'CLOSE', milestoneKey:'closing'  },
  { key:'basement', label:'Basement Finish Bonus',abbr:'BSMT',  milestoneKey:null, requiresBasement:true },
];

// ── Helpers ──────────────────────────────────────────────────────
const genId   = () => Date.now().toString(36) + Math.random().toString(36).substr(2);
const fmtDate = d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : null;
const fmtShort= d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : null;
const daysTo  = d => { if (!d) return null; const t=new Date(); t.setHours(0,0,0,0); return Math.round((new Date(d+'T00:00:00')-t)/86400000); };
const fmtTime = t => { if (!t) return null; const [h,m]=t.split(':').map(Number); return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`; };
const bonusFor= h => BONUS_DEFS.filter(b => b.requiresBasement ? h.basementFinish : true);
const eligible= (h,b)=> b.requiresBasement ? h.basementFinish : !!h.milestones[b.milestoneKey];

function icsUri(address, date, time) {
  const dt=date.replace(/-/g,''), st=time.replace(':','')+'00';
  const h=parseInt(time.split(':')[0]), mn=time.split(':')[1];
  const et=`${String((h+1)%24).padStart(2,'0')}${mn}00`;
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//BuildTrack//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH',
    'BEGIN:VEVENT',`UID:${dt}-${st}-bt@local`,`DTSTART:${dt}T${st}`,`DTEND:${dt}T${et}`,
    `SUMMARY:Walkthrough \u2013 ${address}`,`DESCRIPTION:Home walkthrough at ${address}`,
    'END:VEVENT','END:VCALENDAR'].join('\r\n');
  return `data:text/calendar;charset=utf-8,${encodeURIComponent(ics)}`;
}

// ── Sync ─────────────────────────────────────────────────────────
const configured = () => SCRIPT_URL !== 'YOUR_SCRIPT_URL_HERE';

async function sheetsLoad() {
  const res = await fetch(`${SCRIPT_URL}?t=${Date.now()}`);
  const data = await res.json();
  return Array.isArray(data.houses) ? data.houses : null;
}

async function sheetsSave(houses) {
  await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({ houses }) });
}

// ── UI Primitives ────────────────────────────────────────────────
function Badge({ color, children }) {
  const c = {
    amber: {bg:'rgba(245,158,11,0.12)',  t:'#f59e0b', b:'rgba(245,158,11,0.25)'},
    green: {bg:'rgba(34,197,94,0.12)',   t:'#4ade80', b:'rgba(34,197,94,0.25)'},
    purple:{bg:'rgba(167,139,250,0.12)', t:'#a78bfa', b:'rgba(167,139,250,0.25)'},
    red:   {bg:'rgba(239,68,68,0.12)',   t:'#f87171', b:'rgba(239,68,68,0.25)'},
    blue:  {bg:'rgba(96,165,250,0.12)',  t:'#60a5fa', b:'rgba(96,165,250,0.25)'},
  }[color]||{bg:'rgba(245,158,11,0.12)',t:'#f59e0b',b:'rgba(245,158,11,0.25)'};
  return <span style={{fontSize:9,fontWeight:700,letterSpacing:'0.08em',padding:'2px 7px',borderRadius:3,backgroundColor:c.bg,color:c.t,border:`1px solid ${c.b}`}}>{children}</span>;
}
function SubLine({ house, style }) {
  if (!house.subdivision && !house.lotNumber) return null;
  return <div style={{fontSize:10,color:'#6b7280',letterSpacing:'0.05em',marginTop:3,...style}}>
    {house.subdivision}{house.subdivision&&house.lotNumber?' · ':''}{house.lotNumber&&`Lot ${house.lotNumber}`}
  </div>;
}
function Empty({ icon, text }) {
  return <div style={{textAlign:'center',padding:'60px 20px'}}>
    <div style={{fontSize:44,marginBottom:12}}>{icon}</div>
    <div style={{color:'#4b5563',fontSize:13}}>{text}</div>
  </div>;
}
function Overlay({ title, children }) {
  return <div style={S.overlay}><div style={S.modal}><div style={S.modalTitle}>{title}</div>{children}</div></div>;
}
function Tog({ on, onClick }) {
  return <div style={{...S.toggle,...(on?S.toggleOn:{})}} onClick={onClick}>
    <div style={{...S.thumb,...(on?S.thumbOn:{})}} />
  </div>;
}

// ── App ──────────────────────────────────────────────────────────
function App() {
  const [houses, setHouses]   = useState([]);
  const [view, setView]       = useState('dashboard');
  const [selId, setSelId]     = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [loaded, setLoaded]   = useState(false);
  const [sync, setSync]       = useState('idle');
  const timer = useRef(null);

  useEffect(() => {
    async function load() {
      if (configured()) {
        try {
          const data = await sheetsLoad();
          if (data) {
            setHouses(data);
            try { localStorage.setItem('bt',JSON.stringify(data)); } catch(e){}
            setSync('synced'); setTimeout(()=>setSync('idle'),2000);
            setLoaded(true); return;
          }
        } catch(e) { setSync('offline'); }
      }
      try { const s=localStorage.getItem('bt'); if(s) setHouses(JSON.parse(s)); } catch(e){}
      setLoaded(true);
    }
    load();
  }, []);

  useEffect(() => {
    if (!loaded) return;
    try { localStorage.setItem('bt',JSON.stringify(houses)); } catch(e){}
    if (!configured()) return;
    clearTimeout(timer.current);
    setSync('saving');
    timer.current = setTimeout(async () => {
      try { await sheetsSave(houses); setSync('synced'); setTimeout(()=>setSync('idle'),2500); }
      catch(e) { setSync('error'); }
    }, 1500);
    return () => clearTimeout(timer.current);
  }, [houses, loaded]);

  const addHouse = d => {
    setHouses(p=>[...p,{id:genId(),address:d.address,lotNumber:d.lotNumber,subdivision:d.subdivision,basementFinish:d.basementFinish,notes:'',milestones:{},bonuses:{roughIn:false,co:false,closing:false,basement:false},archived:false}]);
    setShowAdd(false);
  };
  const upM  = (id,k,v) => setHouses(p=>p.map(h=>h.id===id?{...h,milestones:{...h.milestones,[k]:v}}:h));
  const upH  = (id,u)   => setHouses(p=>p.map(h=>h.id===id?{...h,...u}:h));
  const togB = (id,bk)  => setHouses(p=>p.map(h=>h.id===id?{...h,bonuses:{...h.bonuses,[bk]:!h.bonuses[bk]}}:h));
  const arch = id => { setHouses(p=>p.map(h=>h.id===id?{...h,archived:true}:h)); setView('dashboard'); };
  const del  = id => { setHouses(p=>p.filter(h=>h.id!==id)); setView('dashboard'); };

  const sel      = houses.find(h=>h.id===selId);
  const active   = houses.filter(h=>!h.archived);
  const archived = houses.filter(h=>h.archived);
  const byClose  = [...active].sort((a,b)=>{
    if(!a.milestones.closing&&!b.milestones.closing) return 0;
    if(!a.milestones.closing) return 1; if(!b.milestones.closing) return -1;
    return new Date(a.milestones.closing)-new Date(b.milestones.closing);
  });
  const byBonus  = [...active].sort((a,b)=>{
    const au=bonusFor(a).filter(bx=>!a.bonuses[bx.key]&&eligible(a,bx)).length;
    const bu=bonusFor(b).filter(bx=>!b.bonuses[bx.key]&&eligible(b,bx)).length;
    return bu-au;
  });
  const totalOwed = active.reduce((s,h)=>s+bonusFor(h).filter(b=>!h.bonuses[b.key]&&eligible(h,b)).length,0);
  const navView   = view==='detail'?(sel?.archived?'archive':'dashboard'):view;
  const TABS      = [['dashboard','HOMES'],['closing','CLOSINGS'],['bonuses','BONUSES'],['archive','ARCHIVE']];
  const syncMsgs  = {saving:'saving…',synced:'✓ synced',error:'sync error — check connection',offline:'offline — changes saved locally'};

  if (!loaded) return <div style={{...S.app,display:'flex',alignItems:'center',justifyContent:'center'}}>
    <span style={{color:'#f59e0b',fontFamily:"'DM Mono',monospace",letterSpacing:'0.1em'}}>LOADING…</span>
  </div>;

  return (
    <div style={S.app}>
      <div style={S.header}>
        <div style={S.logo}>▪ BUILDTRACK</div>
        <div style={S.nav}>
          {TABS.map(([v,label])=>(
            <button key={v} style={{...S.navBtn,...(navView===v?S.navActive:{})}} onClick={()=>setView(v)}>
              {label}
              {v==='archive'&&archived.length>0&&<span style={{...S.dot,background:'#a78bfa'}}>{archived.length}</span>}
              {v==='bonuses'&&totalOwed>0&&<span style={{...S.dot,background:'#f59e0b',color:'#000'}}>{totalOwed}</span>}
            </button>
          ))}
        </div>
      </div>

      {sync!=='idle'&&syncMsgs[sync]&&(
        <div style={{...S.syncBar,...(sync==='saving'?S.syncSaving:sync==='synced'?S.syncOk:S.syncErr)}}>
          {syncMsgs[sync]}
        </div>
      )}

      <div style={S.body}>
        {!configured()&&(
          <div style={S.banner}>
            ⚙ Open <strong>index.html</strong> and replace <code>YOUR_SCRIPT_URL_HERE</code> with your Apps Script URL to enable Google Sheets sync.
          </div>
        )}
        {view==='dashboard' && <Dashboard houses={active} onSelect={id=>{setSelId(id);setView('detail');}} onAdd={()=>setShowAdd(true)} />}
        {view==='detail'&&sel && <Detail house={sel} onUpdate={(k,v)=>upM(selId,k,v)} onUpdateHouse={u=>upH(selId,u)} onToggleBonus={k=>togB(selId,k)} onArchive={()=>arch(selId)} onDelete={()=>del(selId)} onBack={()=>setView(sel.archived?'archive':'dashboard')} />}
        {view==='closing'   && <Closing houses={byClose} onSelect={id=>{setSelId(id);setView('detail');}} />}
        {view==='bonuses'   && <Bonuses houses={byBonus} onSelect={id=>{setSelId(id);setView('detail');}} onToggleBonus={(id,k)=>togB(id,k)} />}
        {view==='archive'   && <Archive houses={archived} onSelect={id=>{setSelId(id);setView('detail');}} onRestore={id=>upH(id,{archived:false})} />}
      </div>

      {showAdd && <AddModal onAdd={addHouse} onClose={()=>setShowAdd(false)} />}
    </div>
  );
}

// ── Dashboard ────────────────────────────────────────────────────
function Dashboard({ houses, onSelect, onAdd }) {
  return (
    <div>
      <div style={S.ph}><h1 style={S.pt}>Active Homes <span style={S.dc}>{houses.length}</span></h1><button style={S.pBtn} onClick={onAdd}>+ NEW HOME</button></div>
      {houses.length===0&&<Empty icon="🏠" text="No active homes. Tap + NEW HOME to get started." />}
      <div style={S.stack}>
        {houses.map(h=>{
          const done=MILESTONES.filter(m=>h.milestones[m.key]).length;
          const pct=Math.round((done/MILESTONES.length)*100);
          const days=daysTo(h.milestones.closing);
          const owed=bonusFor(h).filter(b=>!h.bonuses[b.key]&&eligible(h,b)).length;
          const past=days!==null&&days<0, urg=days!==null&&days>=0&&days<=7;
          return (
            <div key={h.id} style={S.card} onClick={()=>onSelect(h.id)}>
              <div style={S.cardRow}>
                <div style={{flex:1,marginRight:10}}><div style={S.addr}>{h.address}</div><SubLine house={h} /></div>
                <div style={S.badges}>{h.basementFinish&&<Badge color="amber">BSMT</Badge>}{h.milestones.finalClean&&<Badge color="green">CLEAN ✓</Badge>}</div>
              </div>
              <div style={S.prog}><div style={{...S.progF,width:`${pct}%`}} /></div>
              <div style={S.meta}>
                <span style={S.metaTxt}>{done}/{MILESTONES.length} milestones</span>
                {owed>0&&<Badge color="purple">{owed} bonus{owed>1?'es':''} owed</Badge>}
                {h.milestones.closing&&<span style={{...S.cpill,...(urg?S.pillU:{}),...(past?S.pillP:{})}}>CLOSING {fmtDate(h.milestones.closing)}{days>=0?` · ${days}d`:` · ${Math.abs(days)}d ago`}</span>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Detail ───────────────────────────────────────────────────────
function Detail({ house:h, onUpdate, onUpdateHouse, onToggleBonus, onArchive, onDelete, onBack }) {
  const [confArch, setConfArch] = useState(false);
  const [confDel,  setConfDel]  = useState(false);
  const appl    = bonusFor(h);
  const unclaim = appl.filter(b=>!h.bonuses[b.key]&&eligible(h,b));

  return (
    <div>
      <div style={S.ph}>
        <button style={S.gBtn} onClick={onBack}>← BACK</button>
        <div style={{display:'flex',gap:8}}>
          {!h.archived&&<button style={S.aBtn} onClick={()=>unclaim.length>0?setConfArch(true):onArchive()}>ARCHIVE</button>}
          {h.archived&&<button style={S.pBtn} onClick={()=>onUpdateHouse({archived:false})}>RESTORE</button>}
          <button style={S.dBtn} onClick={()=>setConfDel(true)}>DELETE</button>
        </div>
      </div>

      <h1 style={S.dAddr}>{h.address}</h1>
      <SubLine house={h} style={{marginBottom:16,fontSize:12}} />

      <div style={S.fRow}>
        <div style={S.fGrp}><label style={S.fLbl}>SUBDIVISION</label><input style={S.tIn} value={h.subdivision||''} onChange={e=>onUpdateHouse({subdivision:e.target.value})} placeholder="Subdivision name…" /></div>
        <div style={S.fGrp}><label style={S.fLbl}>LOT NUMBER</label><input style={S.tIn} value={h.lotNumber||''} onChange={e=>onUpdateHouse({lotNumber:e.target.value})} placeholder="e.g. 141" /></div>
      </div>
      <div style={{...S.togRow,marginBottom:20}}>
        <span style={S.togLbl}>BASEMENT FINISH</span>
        <Tog on={h.basementFinish} onClick={()=>onUpdateHouse({basementFinish:!h.basementFinish})} />
      </div>
      <div style={S.div} />

      <div style={S.secLbl}>MILESTONES</div>
      <div style={{...S.stack,marginBottom:28}}>
        {MILESTONES.map((m,i)=>{
          const val=h.milestones[m.key]||'', set=!!val;
          const isW=m.key==='walkthrough', isC=m.key==='finalClean', isCl=m.key==='closing';
          const tv=h.milestones.walkthroughTime||'';
          const days=(isCl||isW)?daysTo(val):null;
          const cal=isW&&val&&tv?icsUri(h.address,val,tv):null;
          return (
            <div key={m.key} style={{...S.mRow,...(isC&&set?S.mClean:{}),...(isCl&&set?S.mClose:{}),...(isW?S.mWalk:{})}}>
              <div style={S.mL}>
                <span style={S.mNum}>{String(i+1).padStart(2,'0')}</span>
                <div>
                  <div style={S.mName}>{m.label}</div>
                  <div style={S.mSub}>{m.sublabel}{isW&&set&&tv?` · ${fmtTime(tv)}`:''}</div>
                </div>
              </div>
              <div style={{...S.mR,flexDirection:'column',alignItems:'flex-end',gap:5}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  {isC&&set&&<Badge color="green">SCHEDULED</Badge>}
                  {days!==null&&set&&<span style={{...S.dPill,color:days<0?'#f87171':days<=7?'#f59e0b':'#60a5fa'}}>{days<0?`${Math.abs(days)}d ago`:days===0?'TODAY':`${days}d`}</span>}
                  <input type="date" value={val} onChange={e=>onUpdate(m.key,e.target.value)} style={S.dIn} />
                </div>
                {isW&&(
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <input type="time" value={tv} onChange={e=>onUpdate('walkthroughTime',e.target.value)} style={{...S.dIn,width:110}} />
                    {cal&&<a href={cal} style={S.calBtn}>📅 iPhone Cal</a>}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      <div style={S.secLbl}>BONUSES</div>
      <div style={{...S.stack,marginBottom:28}}>
        {appl.map(b=>{
          const el=eligible(h,b), cl=h.bonuses[b.key];
          return (
            <div key={b.key} style={{...S.bonRow,...(cl?S.bonCl:el?S.bonEl:{})}}>
              <div style={S.mL}>
                <div style={{...S.bonDot,...(cl?S.bonDotCl:el?S.bonDotEl:{})}} />
                <div>
                  <div style={S.mName}>{b.label}</div>
                  <div style={S.mSub}>{b.milestoneKey&&h.milestones[b.milestoneKey]?`Milestone: ${fmtDate(h.milestones[b.milestoneKey])}`:!el&&!b.requiresBasement?'Set milestone date to unlock':''}</div>
                </div>
              </div>
              <button style={{...S.clBtn,...(cl?S.clDone:el?S.clRdy:S.clLk)}} onClick={()=>el&&onToggleBonus(b.key)} disabled={!el}>{cl?'✓ CLAIMED':'CLAIM'}</button>
            </div>
          );
        })}
      </div>

      <div style={S.secLbl}>NOTES</div>
      <textarea style={S.notes} value={h.notes||''} onChange={e=>onUpdateHouse({notes:e.target.value})} placeholder="Any notes for this home…" rows={4} />

      {confArch&&(
        <Overlay title="Archive this home?">
          <div style={S.mSub2}>{h.address}</div>
          {unclaim.length>0&&<div style={S.warn}><div style={{color:'#fbbf24',fontSize:11,fontWeight:700,marginBottom:6}}>⚠ UNCLAIMED BONUSES</div>{unclaim.map(b=><div key={b.key} style={{color:'#d1d5db',fontSize:11,marginBottom:2}}>• {b.label}</div>)}</div>}
          <div style={S.mBtns}><button style={S.gBtn} onClick={()=>setConfArch(false)}>CANCEL</button><button style={S.archConfBtn} onClick={()=>{setConfArch(false);onArchive();}}>ARCHIVE ANYWAY</button></div>
        </Overlay>
      )}
      {confDel&&(
        <Overlay title="Delete this home?">
          <div style={S.mSub2}>This cannot be undone. {h.address}</div>
          <div style={S.mBtns}><button style={S.gBtn} onClick={()=>setConfDel(false)}>CANCEL</button><button style={{...S.pBtn,backgroundColor:'#ef4444'}} onClick={onDelete}>DELETE</button></div>
        </Overlay>
      )}
    </div>
  );
}

// ── Bonuses ──────────────────────────────────────────────────────
function Bonuses({ houses, onSelect, onToggleBonus }) {
  const hasAny = houses.some(h=>bonusFor(h).length>0);
  return (
    <div>
      <div style={S.ph}><h1 style={S.pt}>Bonus Tracker</h1></div>
      {!hasAny&&<Empty icon="💰" text="No bonuses to track yet. Add milestone dates to unlock." />}
      {hasAny&&(
        <div style={S.bonHead}>
          <div style={{flex:1}}>HOME</div>
          <div style={S.bonCols}>{['R/I','CO','CLOSE','BSMT'].map(l=><div key={l} style={S.bonColH}>{l}</div>)}</div>
        </div>
      )}
      <div style={S.stack}>
        {houses.map(h=>{
          const appl=bonusFor(h);
          if (!appl.length) return null;
          return (
            <div key={h.id} style={S.bonCard}>
              <div style={{...S.bonAddrRow,cursor:'pointer'}} onClick={()=>onSelect(h.id)}>
                <div style={S.addr}>{h.address}</div>
                <SubLine house={h} />
              </div>
              <div style={S.bonChipRow}>
                {BONUS_DEFS.map(b=>{
                  if (!bonusFor(h).find(x=>x.key===b.key)) return <div key={b.key} style={S.bonCell}><div style={S.bonNA}>—</div></div>;
                  const el=eligible(h,b), cl=h.bonuses[b.key];
                  const md=b.milestoneKey?h.milestones[b.milestoneKey]:null;
                  return (
                    <div key={b.key} style={S.bonCell}>
                      <div style={S.bonCLbl}>{b.abbr}</div>
                      {md&&<div style={S.bonCDate}>{fmtShort(md)}</div>}
                      {!el&&!md&&<div style={S.bonCDate}>pending</div>}
                      <button style={{...S.bonCBtn,...(cl?S.chipCl:el?S.chipRdy:S.chipLk)}} onClick={e=>{e.stopPropagation();el&&onToggleBonus(h.id,b.key);}} disabled={!el}>{cl?'✓':'CLAIM'}</button>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Closing ──────────────────────────────────────────────────────
function Closing({ houses, onSelect }) {
  return (
    <div>
      <div style={S.ph}><h1 style={S.pt}>Closing Schedule</h1></div>
      {houses.length===0&&<Empty icon="📅" text="No active homes with closing dates." />}
      <div style={S.stack}>
        {houses.map((h,i)=>{
          const days=daysTo(h.milestones.closing);
          const past=days!==null&&days<0, urg=days!==null&&days>=0&&days<=7, soon=days!==null&&days>7&&days<=30;
          const done=MILESTONES.filter(m=>h.milestones[m.key]).length, pct=Math.round((done/MILESTONES.length)*100);
          const owed=bonusFor(h).filter(b=>!h.bonuses[b.key]&&eligible(h,b)).length;
          const wt=h.milestones.walkthrough, wtT=h.milestones.walkthroughTime;
          return (
            <div key={h.id} style={{...S.clRow,...(urg?S.clUrg:{}),...(past?S.clPast:{})}} onClick={()=>onSelect(h.id)}>
              <div style={S.clRank}>{String(i+1).padStart(2,'0')}</div>
              <div style={S.clInfo}>
                <div style={S.addr}>{h.address}</div>
                <SubLine house={h} style={{marginTop:2}} />
                {wt&&<div style={S.wtLine}>WT: {fmtShort(wt)}{wtT?` · ${fmtTime(wtT)}`:''}</div>}
                <div style={{display:'flex',gap:5,marginTop:5,flexWrap:'wrap',alignItems:'center'}}>
                  {h.basementFinish&&<Badge color="amber">BSMT</Badge>}
                  {h.milestones.finalClean&&<Badge color="green">CLEAN ✓</Badge>}
                  {owed>0&&<Badge color="purple">{owed} bonus{owed>1?'es':''} owed</Badge>}
                  <span style={{...S.metaTxt,fontSize:10}}>{pct}% complete</span>
                </div>
              </div>
              <div style={S.clDate}>
                {h.milestones.closing?(<>
                  <div style={S.clDT}>{fmtDate(h.milestones.closing)}</div>
                  {days!==null&&<div style={{...S.clDays,color:past?'#f87171':urg?'#f59e0b':soon?'#60a5fa':'#6b7280'}}>{past?`${Math.abs(days)}d ago`:days===0?'TODAY':`${days}d away`}</div>}
                </>):<span style={{color:'#374151'}}>—</span>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Archive ──────────────────────────────────────────────────────
function Archive({ houses, onSelect, onRestore }) {
  return (
    <div>
      <div style={S.ph}><h1 style={S.pt}>Archive <span style={S.dc}>{houses.length}</span></h1></div>
      {houses.length===0&&<Empty icon="📦" text="No archived homes yet." />}
      <div style={S.stack}>
        {houses.map(h=>{
          const allCl=bonusFor(h).every(b=>h.bonuses[b.key]);
          const done=MILESTONES.filter(m=>h.milestones[m.key]).length;
          return (
            <div key={h.id} style={{...S.card,opacity:0.85}}>
              <div style={S.cardRow}>
                <div style={{flex:1,cursor:'pointer'}} onClick={()=>onSelect(h.id)}><div style={S.addr}>{h.address}</div><SubLine house={h} /></div>
                <button style={{...S.gBtn,fontSize:10}} onClick={e=>{e.stopPropagation();onRestore(h.id);}}>RESTORE</button>
              </div>
              <div style={{display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}}>
                {h.basementFinish&&<Badge color="amber">BSMT</Badge>}
                {allCl?<Badge color="green">ALL BONUSES CLAIMED</Badge>:<Badge color="red">BONUSES INCOMPLETE</Badge>}
                <span style={S.metaTxt}>{done}/{MILESTONES.length} milestones · Closed {fmtDate(h.milestones.closing)||'—'}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Add Modal ────────────────────────────────────────────────────
function AddModal({ onAdd, onClose }) {
  const [addr,setAddr]=useState(''), [lot,setLot]=useState(''), [sub,setSub]=useState(''), [bsmt,setBsmt]=useState(false);
  const go=()=>{ if(addr.trim()) onAdd({address:addr.trim(),lotNumber:lot.trim(),subdivision:sub.trim(),basementFinish:bsmt}); };
  return (
    <Overlay title="Add New Home">
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <div><label style={S.fLbl}>ADDRESS</label><input style={S.tIn} placeholder="Street address…" value={addr} onChange={e=>setAddr(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} autoFocus /></div>
        <div style={S.fRow}>
          <div style={S.fGrp}><label style={S.fLbl}>SUBDIVISION</label><input style={S.tIn} placeholder="Name…" value={sub} onChange={e=>setSub(e.target.value)} /></div>
          <div style={S.fGrp}><label style={S.fLbl}>LOT #</label><input style={S.tIn} placeholder="e.g. 141" value={lot} onChange={e=>setLot(e.target.value)} /></div>
        </div>
        <div style={{...S.togRow,marginTop:4}}>
          <span style={S.togLbl}>BASEMENT FINISH</span>
          <Tog on={bsmt} onClick={()=>setBsmt(!bsmt)} />
        </div>
      </div>
      <div style={{...S.mBtns,marginTop:20}}>
        <button style={S.gBtn} onClick={onClose}>CANCEL</button>
        <button style={{...S.pBtn,opacity:addr.trim()?1:0.4}} onClick={go}>ADD HOME</button>
      </div>
    </Overlay>
  );
}
